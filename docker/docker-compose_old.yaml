services:
  postgres_container:
    build:
      context: .     # Folder with Dockerfile
      dockerfile: ./docker/container__postgres/Dockerfile
    ports:
      - "5432:5432" # not needed for docker networking, just if I want to docker exec into the container
    environment:
      POSTGRES_USER: local_testing
      POSTGRES_PASSWORD: local_testing_password
      POSTGRES_DB: database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_testing"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./pgdata:/var/lib/postgresql/data
  
  scripts_container:
    build:
      context: .
      dockerfile: docker/container__scripts/Dockerfile
    command: tail -f /dev/null
    ports:
      - "4000:4000"
    volumes:
      - ./docker/container__scripts/pyproject.toml:/work_dir/pyproject.toml:ro
      - ./docker/container__scripts/poetry.lock:/work_dir/poetry.lock:ro
      - ./.dbt:/root/.dbt
      - ./scripts:/work_dir/src
    working_dir: /work_dir
    depends_on:
      - postgres_container
    environment:
      DB_HOST: postgres
   # command: sleep infinity

volumes:
  pgdata:

networks:
  app-network:

services:
  postgres:
    build:
      context: /home/greg/fpl_data_platform      # Folder with Dockerfile
      dockerfile: ./docker/postgres/Dockerfile
    container_name: postgres_local
    ports:
      - "5432:5432" # not needed for docker networking, just if I want to docker exec into the container
    environment:
      POSTGRES_USER: local_testing
      POSTGRES_PASSWORD: local_testing_password
      POSTGRES_DB: test_db
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  test_linux:
    build:
      context: /home/greg/fpl_data_platform       # Folder with Dockerfile
      dockerfile: ./docker/linux_folder/Dockerfile
    volumes: 
      - /home/greg/fpl_data_platform/ingestion/etl:/app
    container_name: linux_local

volumes:
  pgdata:

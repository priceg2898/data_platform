networks:
  data_platform:
    external: true

services:  
  minio:
    container_name: minio
    networks:
      - data_platform
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
    volumes:
      - ../../../../data/minio-data:/data
    environment:
      MINIO_ROOT_USER: greg
      MINIO_ROOT_PASSWORD: greg1234

  minio-buckets:
    image: quay.io/minio/mc:latest
    networks:
      - data_platform
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set dockerminio http://minio:9000 greg greg1234;
      /usr/bin/mc mb dockerminio/yourbucketname;
      exit 0;
      "
  #   ports:
  #     - "9096:9096"

  postgres1:
    image: postgres:16
    container_name: postgres1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: greg
      POSTGRES_PASSWORD: greg1
      POSTGRES_DB: postgres
    volumes:
      - postgres1-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "greg"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  dummy_data_generator:
    container_name: dummy_data_generator
    build:
      context: .
      dockerfile: docker/Dockerfile__dummy_data_generator
    depends_on:
      - postgres1

volumes:
  kafka1-data:
  # kafka2-data:
  # kafka3-data:

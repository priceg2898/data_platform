services:
  postgres_container:
    build:
      context: .     # Folder with Dockerfile
      dockerfile: ./docker/container__postgres/Dockerfile
    ports:
      - "5432:5432" # not needed for docker networking, just if I want to docker exec into the container
    environment:
      POSTGRES_USER: local_testing
      POSTGRES_PASSWORD: local_testing_password
      POSTGRES_DB: database
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  scripts_container:
    build:
      context: .
      dockerfile: docker/container__scripts/Dockerfile
    volumes: 
      - ./scripts:/work_dir
      - ./.dbt:/root/.dbt:ro 
    working_dir: /work_dir
    depends_on:
      - postgres_container
    environment:
      DB_HOST: postgres
    command: sleep infinity

volumes:
  pgdata:

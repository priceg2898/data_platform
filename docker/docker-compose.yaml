services:
  postgres:
    build:
      context: ./postgres       # Folder with Dockerfile
    container_name: postgres_local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: local_testing
      POSTGRES_PASSWORD: local_testing_password
      POSTGRES_DB: test_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
